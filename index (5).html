<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Password Protected Folder</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f9f9f9; }
    .container { max-width: 500px; margin: auto; border: 1px solid #ddd; padding: 20px; border-radius: 10px; background: #fff; }
    input[type="password"] { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
    button, .btn { padding: 10px 20px; cursor: pointer; border: 1px solid #aaa; background: #fff; text-decoration: none; color: black; font-size: 13px; display: inline-block; border-radius: 4px; }
    button:hover, .btn:hover { background: #eee; }
    .hidden { display: none; }
    .file-item { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
    .media-preview { max-width: 100%; border-radius: 5px; margin-top: 10px; display: block; background: #000; }
    #add-btn { background: #007bff; color: white; border: none; }
    .actions { margin-top: 10px; display: flex; gap: 10px; }
  </style>
</head>
<body>

<div class="container">
  <div id="login-section">
    <h1>Vault Login</h1>
    <input type="password" id="login-input" placeholder="Password...">
    <br>
    <button onclick="doLogin()">Enter</button>
  </div>

  <div id="main-section" class="hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #333;">
        <h2 style="margin:0;">Files</h2>
        <button onclick="location.reload()">Lock</button>
    </div>

    <div style="margin: 20px 0; text-align: left; background: #f0f0f0; padding: 10px; border-radius: 5px;">
        <input type="file" id="file-picker" style="display:none;" onchange="handleSelect()">
        <button onclick="document.getElementById('file-picker').click()">Select File</button>
        <span id="selected-name" style="font-size: 0.8em; margin-left: 5px;"></span>
        <button id="add-btn" class="hidden" onclick="addToFileList()">Add File</button>
    </div>

    <div id="file-display"></div>

    <div style="margin-top:50px; border-top: 1px solid #eee; padding-top:20px; text-align: left;">
        <strong>Security Settings</strong><br>
        <input type="password" id="auto-save-pass" placeholder="Type to change password...">
    </div>
  </div>
</div>

<script>
  let db;
  let pass = localStorage.getItem('f_v_pass') || "";

  const request = indexedDB.open("FeonixxDB", 1);
  request.onupgradeneeded = e => {
    db = e.target.result;
    db.createObjectStore("files", { keyPath: "id", autoIncrement: true });
  };
  request.onsuccess = e => { db = e.target.result; };

  window.doLogin = function() {
    if (document.getElementById('login-input').value === pass) {
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('main-section').classList.remove('hidden');
      document.getElementById('auto-save-pass').value = pass;
      render();
    } else { alert("Wrong Password"); }
  };

  document.getElementById('auto-save-pass').oninput = (e) => {
    pass = e.target.value;
    localStorage.setItem('f_v_pass', pass);
  };

  window.handleSelect = function() {
    const f = document.getElementById('file-picker').files[0];
    if(f) {
      document.getElementById('selected-name').textContent = f.name;
      document.getElementById('add-btn').classList.remove('hidden');
    }
  };

  window.addToFileList = function() {
    const file = document.getElementById('file-picker').files[0];
    if(!file) return;
    const transaction = db.transaction(["files"], "readwrite");
    const store = transaction.objectStore("files");
    const newEntry = { name: file.name, type: file.type, data: file, date: new Date().toLocaleDateString() };
    store.add(newEntry).onsuccess = () => {
      document.getElementById('selected-name').textContent = "";
      document.getElementById('add-btn').classList.add('hidden');
      render();
    };
  };

  window.del = function(id) {
    if(!confirm("Delete file?")) return;
    const transaction = db.transaction(["files"], "readwrite");
    transaction.objectStore("files").delete(id);
    transaction.oncomplete = () => render();
  };

  function render() {
    const out = document.getElementById('file-display');
    const transaction = db.transaction(["files"], "readonly");
    const store = transaction.objectStore("files");
    const getAll = store.getAll();

    getAll.onsuccess = () => {
      const files = getAll.result;
      out.innerHTML = files.length ? "" : "<p style='color:#888;'>No files.</p>";
      
      files.reverse().forEach((f) => {
        const row = document.createElement('div');
        row.className = 'file-item';
        
        const url = URL.createObjectURL(f.data);
        
        let previewHtml = "";
        if (f.type.startsWith("image/")) {
          previewHtml = `<img src="${url}" class="media-preview">`;
        } else if (f.type.startsWith("video/")) {
          previewHtml = `<video src="${url}" controls class="media-preview"></video>`;
        }

        row.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:center;">
              <strong>${f.name}</strong>
              <button onclick="del(${f.id})" style="color:red; border:none; background:none; font-weight:bold; font-size:1.2em;">&times;</button>
          </div>
          ${previewHtml}
          <div class="actions">
              <a href="${url}" download="${f.name}" class="btn">Download</a>
          </div>
          <div style="margin-top:5px;"><small style="color:#888;">${f.date}</small></div>
        `;
        out.appendChild(row);
      });
    };
  }
</script>
</body>
</html>
